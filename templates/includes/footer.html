<footer class="jms-footer mt-5">
  <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-3">
    <p class="mb-0 text-center text-md-start">&copy; {% now "Y" %} Journal Management System</p>
    <div class="text-center">
      <a href="{% url 'journal:journal_list' %}" class="me-3 text-decoration-none">Journals</a>
      <a href="{% url 'journal:publication_list' %}" class="me-3 text-decoration-none">Articles</a>
      <a href="{% url 'core:home' %}#contact" class="text-decoration-none">Contact</a>
    </div>
    {% if user.is_authenticated and show_logout|default_if_none:True %}
      <form action="{% url 'accounts:logout' %}" method="post" class="mb-0 text-center text-md-end">
        {% csrf_token %}
        <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
      </form>
    {% endif %}
  </div>
</footer>
