{% extends 'base_public.html' %}
{% block title %}Set New Password{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="jms-card p-4">
      <h4 class="mb-3 text-center">Set a New Password</h4>
      {% if validlink %}
        <form method="post" novalidate>
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">New Password</label>
            <input type="password" name="new_password1" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm New Password</label>
            <input type="password" name="new_password2" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Change Password</button>
        </form>
      {% else %}
        <p class="text-danger">This password reset link is invalid, possibly because it has already been used.</p>
      {% endif %}
    </div>
  </div>
</div>
{% endblock %}
