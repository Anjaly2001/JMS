{% extends 'base_public.html' %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="jms-card p-4">
      <h4 class="mb-3 text-center"><i class="bi bi-key text-primary"></i> Forgot Password</h4>
      <p class="text-muted small">Enter your registered email and we'll send you a link to reset your password.</p>
      <form method="post" novalidate>
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
